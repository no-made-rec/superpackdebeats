<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Liberado</title>

<meta name="robots" content="noindex">

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #111, #000);
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

h1 {
  margin-top: 40px;
}

.subtitle {
  color: #aaa;
}

.cta {
  display: block;
  background: #2ecc71;
  color: #000;
  padding: 18px;
  border-radius: 20px;
  margin: 30px auto;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.cta:hover {
  transform: scale(1.05);
}

.loading {
  display: none;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid rgba(255,255,255,0.1);
  border-top: 4px solid #65c1fb;
  border-radius: 50%;
  margin: 20px auto;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.fade-out {
  animation: fadeOut 0.5s forwards;
}

.fade-in {
  animation: fadeIn 0.5s forwards;
}

@keyframes fadeOut {
  to { opacity: 0; transform: translateY(-15px); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">

<h1 id="title">🎧 DOWNLOAD LIBERADO</h1>

<p id="subtitle" class="subtitle">
Parabéns pela aquisição do SUPERPACK DE BEATS<br>
Seu acesso está disponível abaixo
</p>

<div id="btn" class="cta">BAIXAR AGORA</div>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <p>Preparando seu download...</p>
</div>

</div>

<script>

// 🔐 LINK "ESCONDIDO" (fragmentado)
const p1 = "https://drive.google.com/";
const p2 = "uc?export=download&id=";
const p3 = "1N5SOAnOCGBLS2irzaRPdMyycpVIeNZjV";

function getLink() {
  return p1 + p2 + p3;
}

// 🔑 TOKEN
const VALID_TOKEN = "apzin2026";
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

// ELEMENTOS
const btn = document.getElementById("btn");
const loading = document.getElementById("loading");
const title = document.getElementById("title");
const subtitle = document.getElementById("subtitle");

let done = false;

if (token === VALID_TOKEN) {

  btn.onclick = () => {

    if (done) return;

    btn.style.display = "none";
    loading.style.display = "block";

    // download
    setTimeout(() => {
      window.open(getLink(), "_blank");
    }, 1000);

    // UX final
    setTimeout(() => {

      done = true;

      title.classList.add("fade-out");
      subtitle.classList.add("fade-out");

      setTimeout(() => {
        title.innerHTML = "🔥 O PRÓXIMO HIT COMEÇA AGORA";
        title.classList.remove("fade-out");
        title.classList.add("fade-in");

        subtitle.style.display = "none";
      }, 500);

      loading.style.display = "none";

      btn.style.display = "block";
      btn.innerHTML = "✔ DOWNLOAD CONCLUÍDO";
      btn.style.background = "#2ecc71";
      btn.style.color = "#fff";
      btn.style.cursor = "default";

      // trava botão
      btn.replaceWith(btn.cloneNode(true));

    }, 6000);

  };

} else {

  document.body.style.background = "#000";
  document.body.innerHTML = `
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;">
      <h1>⛔ Acesso não autorizado</h1>
    </div>
  `;
}

</script>

</body>
</html>
