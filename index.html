<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Superpack de Beats</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: white;
  font-family: Arial;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  font-size: 32px;
}

.subtitle {
  text-align: center;
  color: #aaa;
  margin-bottom: 30px;
}

.cover {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 20px;
}

.cta {
  display: block;
  text-align: center;
  background: #65c1fb;
  color: black;
  padding: 15px;
  border-radius: 10px;
  margin: 20px 0;
  text-decoration: none;
  font-weight: bold;
}

.beat {
  background: #141414;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

.info {
  display: flex;
  justify-content: space-between;
  color: #aaa;
  font-size: 14px;
}

audio {
  width: 100%;
  margin-top: 10px;
}

.locked {
  text-align: center;
  margin: 40px 0;
  padding: 20px;
  background: #111;
  border-radius: 12px;
}

.price {
  text-align: center;
  margin: 20px 0;
}

.old {
  text-decoration: line-through;
  color: #777;
}

.new {
  font-size: 28px;
  color: #65c1fb;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 Superpack de Beats</h1>
<p class="subtitle">36 beats exclusivos • Ouça o preview abaixo</p>

<!-- CAPA (depois você troca o link) -->
<img src="img/capa.jpg" class="cover">

<a class="cta" href="#">COMPRAR AGORA</a>

<div class="price">
  <div class="old">De R$ 189,90</div>
  <div class="new">Por R$ 85</div>
</div>

<!-- BEAT TESTE -->
<div class="beat">
  <strong>WHAT</strong>
  <div class="info">
    <span>BPM: 103</span>
    <span>Key: Abm</span>
  </div>

  <audio controls>
    <source src="audio/what.mp3" type="audio/mpeg">
  </audio>
</div>

<!-- BLOCO DE VENDA -->
<div class="locked">
  <h2>🔒 Desbloqueie o Pack Completo</h2>
  <p>+26 beats exclusivos • WAV • Pronto pra lançar</p>
  <a class="cta" href="#">QUERO OS 36 BEATS</a>
</div>

</div>

</body>
</html>
