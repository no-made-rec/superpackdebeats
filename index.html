<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPERPACK DE BEATS</title>

<script src="https://unpkg.com/wavesurfer.js"></script>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #111, #000);
  color: white;
  font-family: -apple-system, sans-serif;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 16px;
}

/* HEADER */
h1 {
  text-align: center;
  font-size: 26px;
}

.subtitle {
  text-align: center;
  color: #bbb;
  margin-bottom: 20px;
  font-size: 14px;
}

/* CAPA */
.cover {
  width: 100%;
  border-radius: 16px;
  margin-bottom: 20px;
}

/* BOTÃO */
.cta {
  display: block;
  text-align: center;
  background: linear-gradient(135deg, #65c1fb, #4ea8de);
  color: black;
  padding: 16px;
  border-radius: 14px;
  margin: 20px 0;
  text-decoration: none;
  font-weight: bold;
  transition: 0.2s;
}

.cta:hover {
  background: #ffd84d;
}

/* PREÇO */
.price {
  text-align: center;
}

.old {
  text-decoration: line-through;
  color: #666;
}

.new {
  font-size: 28px;
  color: #65c1fb;
  font-weight: bold;
}

/* BEAT */
.beat {
  background: #111;
  padding: 16px;
  border-radius: 14px;
  margin-bottom: 15px;
  border: 1px solid rgba(255,255,255,0.05);
}

.beat.active {
  border: 1px solid #65c1fb;
  box-shadow: 0 0 20px rgba(101,193,251,0.4);
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.play-btn {
  background: #65c1fb;
  border: none;
  border-radius: 8px;
  padding: 6px 10px;
  cursor: pointer;
  font-weight: bold;
}

.play-btn:hover {
  background: #ffd84d;
}

.info {
  display: flex;
  justify-content: space-between;
  color: #aaa;
  font-size: 13px;
  margin-top: 5px;
}

.waveform {
  margin-top: 10px;
}

/* BLOCO FINAL */
.locked {
  text-align: center;
  margin: 30px 0;
  padding: 20px;
  background: #111;
  border-radius: 14px;
}

/* BOTÃO FIXO */
.fixed-cta {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #65c1fb;
  text-align: center;
  padding: 16px;
  font-weight: bold;
  color: black;
  text-decoration: none;
}

/* RESPONSIVO */
@media (min-width: 768px) {
  h1 {
    font-size: 32px;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 SUPERPACK DE BEATS</h1>
<p class="subtitle">36 beats exclusivos • Acesso imediato</p>

<img src="img/capa.jpg" class="cover">

<a class="cta" href="https://mpago.li/2k8gYXw" target="_blank">
LIBERAR OS 36 BEATS AGORA
</a>

<div class="price">
  <div class="old">De R$ 189,90</div>
  <div class="new">Por apenas R$ 85</div>
</div>

<!-- BEAT -->
<div class="beat" onclick="playBeat(0)">
  <div class="top">
    <strong>WHAT</strong>
    <button class="play-btn">▶</button>
  </div>

  <div class="info">
    <span>BPM: 103</span>
    <span>Key: Abm</span>
  </div>

  <div id="waveform-0" class="waveform"></div>
</div>

<div class="locked">
  <h2>🔒 Desbloqueie o Pack Completo</h2>
  <p>+26 beats exclusivos • Qualidade profissional</p>

  <a class="cta" href="https://mpago.li/2k8gYXw" target="_blank">
  ACESSAR AGORA
  </a>
</div>

</div>

<a class="fixed-cta" href="https://mpago.li/2k8gYXw" target="_blank">
LIBERAR PACK POR R$ 85
</a>

<script>
let players = [];
let current = null;

function createPlayer(index, url) {
  const wave = WaveSurfer.create({
    container: '#waveform-' + index,
    waveColor: '#555',
    progressColor: '#65c1fb',
    height: 60
  });

  wave.load(url);
  players[index] = wave;
}

function playBeat(index) {
  if (current !== null && current !== index) {
    players[current].pause();
    document.querySelectorAll('.beat')[current].classList.remove('active');
  }

  players[index].playPause();
  current = index;

  document.querySelectorAll('.beat')[index].classList.toggle('active');
}

createPlayer(0, "audio/what.mp3");
</script>

</body>
</html>
